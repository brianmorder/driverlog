<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Driver Log">
<title>Driver Log</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --accent: #F59E0B;
    --bg: #0F172A;
    --card: #1E293B;
    --border: #334155;
    --text: #F1F5F9;
    --muted: #94A3B8;
    --green: #22C55E;
    --red: #EF4444;
    --purple: #818CF8;
    --cyan: #22D3EE;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    min-height: 100vh;
    overscroll-behavior: none;
  }
  #app { max-width: 430px; margin: 0 auto; padding-bottom: 90px; min-height: 100vh; }

  /* HEADER */
  #header {
    padding: env(safe-area-inset-top, 44px) 20px 16px;
    padding-top: max(env(safe-area-inset-top, 44px), 44px);
    background: linear-gradient(180deg, #0F172A 0%, #1E293B 100%);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
  }
  .header-inner { display: flex; align-items: center; gap: 10px; }
  .header-icon { font-size: 28px; }
  .header-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .header-sub { font-size: 13px; color: var(--muted); }
  .header-badges { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

  /* TAB BAR */
  #tabbar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: #0F172A; border-top: 1px solid var(--border);
    display: flex; padding: 8px 0;
    padding-bottom: max(env(safe-area-inset-bottom, 16px), 16px);
    z-index: 100;
  }
  .tab-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; background: none; border: none;
    color: var(--muted); font-size: 10px; font-weight: 600;
    cursor: pointer; padding: 6px 0; letter-spacing: 0.5px;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-icon { font-size: 22px; }

  /* SECTION */
  .section { padding: 20px 16px 0; }

  /* CARD */
  .card {
    background: var(--card); border-radius: 16px; padding: 18px;
    border: 1px solid var(--border); margin-bottom: 12px;
  }
  .card-title {
    font-size: 11px; color: var(--muted); font-weight: 700;
    letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 14px;
  }

  /* LABEL + INPUT */
  label.field-label {
    font-size: 11px; color: var(--muted); font-weight: 600;
    letter-spacing: 0.8px; margin-bottom: 6px; display: block; text-transform: uppercase;
  }
  input.field-input, textarea.field-input {
    width: 100%; background: #0F172A; border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 16px;
    outline: none; font-family: inherit;
  }
  textarea.field-input { resize: none; min-height: 70px; }

  /* DRIVER TABS */
  .driver-tabs { display: flex; gap: 8px; background: #0F172A; padding: 4px; border-radius: 12px; }
  .driver-tab {
    flex: 1; padding: 9px 0; border-radius: 10px; border: none;
    background: #0F172A; color: var(--muted);
    font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s;
  }
  .driver-tab.active { background: var(--accent); color: #000; }

  /* CHIPS */
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .chip {
    padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
    background: #0F172A; color: var(--muted); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s;
  }
  .chip.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* BIG BUTTON */
  .big-btn {
    width: 100%; padding: 22px 0; border-radius: 18px;
    border: none; color: #fff; font-size: 22px; font-weight: 800;
    letter-spacing: -0.3px; cursor: pointer; transition: all 0.2s;
    margin-bottom: 12px;
  }
  .big-btn.start {
    background: linear-gradient(135deg, var(--green), #16A34A);
    box-shadow: 0 0 30px #22C55E44;
  }
  .big-btn.stop {
    background: linear-gradient(135deg, var(--red), #DC2626);
    box-shadow: 0 0 30px #EF444444;
  }

  /* TIMER */
  .timer-display {
    text-align: center; font-size: 52px; font-weight: 800; letter-spacing: -2px;
    color: var(--accent); font-variant-numeric: tabular-nums;
    text-shadow: 0 0 40px #F59E0B66;
  }
  .timer-sub { text-align: center; font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* STAT GRID */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .stat-box {
    background: #0F172A; border-radius: 12px; padding: 12px 10px;
    text-align: center; border: 1px solid var(--border);
  }
  .stat-num { font-size: 22px; font-weight: 800; color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.5px; text-transform: uppercase; }

  /* SESSION ROW */
  .session-row {
    background: var(--card); border-radius: 14px; padding: 14px 16px;
    border: 1px solid var(--border); margin-bottom: 10px; cursor: pointer;
  }
  .session-row.expanded { border-color: #F59E0B55; }
  .session-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .session-driver { font-size: 15px; font-weight: 700; }
  .session-date { font-size: 12px; color: var(--muted); }
  .session-duration { font-size: 18px; font-weight: 800; color: var(--accent); }
  .session-miles { font-size: 12px; color: var(--muted); }
  .session-meta { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
  .session-meta-time { font-size: 13px; color: var(--muted); }
  .session-detail { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
  .session-odo { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .session-notes { font-size: 13px; color: var(--text); margin-bottom: 8px; }

  /* BADGE */
  .badge {
    display: inline-block; padding: 3px 9px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
  }
  .badge-green { background: #22C55E22; color: var(--green); }
  .badge-amber { background: #F59E0B22; color: var(--accent); }

  /* ACTION BUTTONS */
  .action-btn {
    width: 100%; padding: 10px 0; border-radius: 10px;
    font-size: 13px; font-weight: 600; cursor: pointer; border: none;
    margin-top: 4px;
  }
  .action-btn.danger { background: #EF444422; color: var(--red); border: 1px solid #EF444444; }
  .action-btn.primary { background: #F59E0B22; color: var(--accent); border: 1px solid #F59E0B44; }

  /* SUMMARY ROW */
  .summary-row { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .summary-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .summary-name { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .summary-stats { display: flex; gap: 16px; font-size: 13px; color: var(--muted); flex-wrap: wrap; }

  /* ACTIVE CARD */
  .active-card { border-color: #F59E0B55 !important; }
  .active-label { font-size: 11px; color: var(--accent); font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase; }
  .active-info { font-size: 13px; color: var(--muted); margin-bottom: 4px; }

  /* RESTORE CARD */
  .restore-card { border-color: #F59E0B44 !important; }
  .restore-desc { font-size: 13px; color: var(--muted); margin-bottom: 12px; }

  /* FILTER ROW */
  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
  .filter-row::-webkit-scrollbar { display: none; }

  /* EMPTY STATE */
  .empty { text-align: center; color: var(--muted); padding: 40px 0; font-size: 15px; }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="header-inner">
      <span class="header-icon">🚗</span>
      <div>
        <div class="header-title">Driver Log</div>
        <div class="header-sub">Teen driving tracker</div>
      </div>
      <div class="header-badges">
        <span id="badge-active" class="badge badge-green" style="display:none">● ACTIVE</span>
        <span id="badge-saved" class="badge badge-amber" style="display:none">✓ SAVED</span>
      </div>
    </div>
  </div>

  <!-- HOME VIEW -->
  <div id="view-home" class="view active">
    <div class="section">

      <!-- Active session -->
      <div id="active-card" class="card active-card" style="display:none">
        <div class="active-label">Session in Progress</div>
        <div id="active-info" class="active-info"></div>
        <div id="timer" class="timer-display">00:00</div>
        <div class="timer-sub">elapsed time</div>
      </div>

      <!-- Driver selector (pre-drive) -->
      <div id="driver-card" class="card">
        <div class="card-title">Driver</div>
        <div class="driver-tabs" id="driver-tabs"></div>
      </div>

      <!-- Conditions (pre-drive) -->
      <div id="condition-card" class="card">
        <div class="card-title">Conditions</div>
        <div class="chips" id="condition-chips"></div>
      </div>

      <!-- Start odometer (pre-drive) -->
      <div id="start-odo-card" class="card">
        <label class="field-label">Start Odometer (optional)</label>
        <input id="start-odo" class="field-input" type="number" inputmode="decimal" placeholder="e.g. 47823">
      </div>

      <!-- Supervisor (pre-drive) -->
      <div id="supervisor-card" class="card">
        <div class="card-title">Supervising Adult</div>
        <div class="chips" id="supervisor-chips"></div>
        <input id="supervisor-name" class="field-input" placeholder="Supervisor name" style="margin-top:12px" list="supervisor-suggestions" autocomplete="off">
        <datalist id="supervisor-suggestions"></datalist>
      </div>

      <!-- End odometer + notes (during drive) -->
      <div id="end-card" class="card" style="display:none">
        <label class="field-label">End Odometer (optional)</label>
        <input id="end-odo" class="field-input" type="number" inputmode="decimal" placeholder="e.g. 47851">
        <div style="margin-top:14px">
          <label class="field-label">Notes</label>
          <textarea id="notes" class="field-input" placeholder="Highway practice, parallel parking, etc."></textarea>
        </div>
      </div>

      <!-- Big button -->
      <button id="main-btn" class="big-btn start" onclick="toggleDrive()">▶  Start Drive</button>

      <!-- Stats -->
      <div id="stats-section"></div>
    </div>
  </div>

  <!-- LOG VIEW -->
  <div id="view-log" class="view">
    <div class="section">
      <div class="filter-row" id="filter-row"></div>
      <div id="sessions-list"></div>
    </div>
  </div>

  <!-- SETTINGS VIEW -->
  <div id="view-settings" class="view">
    <div class="section">

      <!-- Driver names -->
      <div class="card">
        <div class="card-title">Driver Names</div>
        <div id="driver-name-inputs"></div>
      </div>

      <!-- Summary -->
      <div class="card">
        <div class="card-title">All Drivers Summary</div>
        <div id="summary-list"></div>
      </div>

      <!-- Export -->
      <div class="card">
        <div class="card-title">Export</div>
        <button class="action-btn primary" onclick="exportCSV()">Export to CSV</button>
        <button class="action-btn primary" style="margin-top:8px" onclick="exportJSON()">Export Backup JSON</button>
      </div>

      <!-- Restore (only shown when empty) -->
      <div id="restore-card" class="card restore-card" style="display:none">
        <div class="card-title">Restore Backup</div>
        <div class="restore-desc">No local data found. Restore from a previous JSON backup.</div>
        <input id="file-input" type="file" accept=".json" style="display:none" onchange="restoreJSON(event)">
        <button class="action-btn primary" onclick="document.getElementById('file-input').click()">📂 Load Backup JSON</button>
      </div>
    </div>
  </div>

  <!-- TAB BAR -->
  <div id="tabbar">
    <button class="tab-btn active" id="tab-home" onclick="switchView('home')">
      <span class="tab-icon">🚗</span>DRIVE
    </button>
    <button class="tab-btn" id="tab-log" onclick="switchView('log')">
      <span class="tab-icon">📋</span>LOG
    </button>
    <button class="tab-btn" id="tab-settings" onclick="switchView('settings')">
      <span class="tab-icon">⚙️</span>SETTINGS
    </button>
  </div>
</div>

<script>
const STORAGE_KEY = 'teen_driver_log_v1';
const CONDITIONS = ['Daylight','Night','Rain','Highway','City','Adverse'];

let state = load();
let selectedDriver = 0;
let selectedCondition = 'Daylight';
let selectedSupervisorType = 'Parent';
let timerInterval = null;
let expandedId = null;
let filterDriver = 'All';
let currentView = 'home';

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return { sessions: [], active: null, drivers: ['Driver 1', 'Driver 2', 'Driver 3'] };
}

function persist(d) {
  state = d;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {}
}

function driverNames() {
  return state.drivers.map((d, i) => d || `Driver ${i + 1}`);
}

function formatDuration(ms) {
  if (!ms || ms < 0) return '0m';
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return h === 0 ? `${m}m` : `${h}h ${m}m`;
}

function formatTime(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatDate(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
}

function statsFor(name) {
  const s = state.sessions.filter(x => x.driver === name);
  return {
    count: s.length,
    totalMs: s.reduce((a, b) => a + b.duration, 0),
    totalMiles: Math.round(s.reduce((a, b) => a + (b.miles || 0), 0) * 10) / 10,
    night: s.filter(x => x.condition === 'Night').length,
    adverse: s.filter(x => x.condition === 'Adverse').length,
  };
}

function badgeColor(condition) {
  if (condition === 'Night') return '#818CF822;color:#818CF8';
  if (condition === 'Adverse') return '#EF444422;color:#EF4444';
  return '#22D3EE22;color:#22D3EE';
}

// ---- RENDER ----

function render() {
  renderDriverTabs();
  renderConditionChips();
  renderSupervisorChips();
  renderDriveUI();
  renderStats();
  renderLog();
  renderSettings();
  renderHeader();
}

function renderHeader() {
  document.getElementById('badge-active').style.display = state.active ? '' : 'none';
  document.getElementById('restore-card').style.display = !localStorage.getItem(STORAGE_KEY) ? '' : 'none';
}

function renderDriverTabs() {
  const names = driverNames();
  document.getElementById('driver-tabs').innerHTML = names.map((n, i) =>
    `<button class="driver-tab${selectedDriver === i ? ' active' : ''}" onclick="selectDriver(${i})">${n}</button>`
  ).join('');
}

function renderConditionChips() {
  document.getElementById('condition-chips').innerHTML = CONDITIONS.map(c =>
    `<button class="chip${selectedCondition === c ? ' active' : ''}" onclick="selectCondition('${c}')">${c}</button>`
  ).join('');
}

function renderSupervisorChips() {
  const el = document.getElementById('supervisor-chips');
  if (!el) return;
  const types = ['Parent','Instructor','Other'];
  el.innerHTML = types.map(t =>
    `<button class="chip${selectedSupervisorType === t ? ' active' : ''}" onclick="selectSupervisorType('${t}')">${t}</button>`
  ).join('');
  // Populate autocomplete from past sessions
  const dl = document.getElementById('supervisor-suggestions');
  if (dl) {
    const names = [...new Set(state.sessions.map(s => s.supervisorName).filter(Boolean))];
    dl.innerHTML = names.map(n => `<option value="${n}">`).join('');
  }
}

function renderDriveUI() {
  const active = state.active;
  document.getElementById('active-card').style.display = active ? '' : 'none';
  document.getElementById('driver-card').style.display = active ? 'none' : '';
  document.getElementById('condition-card').style.display = active ? 'none' : '';
  document.getElementById('start-odo-card').style.display = active ? 'none' : '';
  document.getElementById('supervisor-card').style.display = active ? 'none' : '';
  document.getElementById('end-card').style.display = active ? '' : 'none';

  const btn = document.getElementById('main-btn');
  if (active) {
    btn.textContent = '⏹  Stop Drive';
    btn.className = 'big-btn stop';
    const gpsStr = active.startGPS ? ` · 📍 GPS` : ' · No GPS';
    const supStr = active.supervisorName ? ` · ${active.supervisorType}: ${active.supervisorName}` : '';
    document.getElementById('active-info').textContent =
      `${active.driver} · ${active.condition} · Started ${formatTime(active.startTime)}${gpsStr}${supStr}`;
    startTimer();
  } else {
    btn.textContent = '▶  Start Drive';
    btn.className = 'big-btn start';
    stopTimer();
  }
}

function renderStats() {
  const names = driverNames();
  let html = '';
  names.forEach(name => {
    const st = statsFor(name);
    if (st.count === 0) return;
    html += `<div class="card" style="margin-top:4px">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px">${name}</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-num">${formatDuration(st.totalMs)}</div><div class="stat-label">Total Time</div></div>
        <div class="stat-box"><div class="stat-num">${st.totalMiles > 0 ? st.totalMiles : '—'}</div><div class="stat-label">Miles</div></div>
        <div class="stat-box"><div class="stat-num">${st.count}</div><div class="stat-label">Sessions</div></div>
      </div>
    </div>`;
  });
  document.getElementById('stats-section').innerHTML = html;
}

function renderLog() {
  const names = driverNames();
  // Filter chips
  const allFilters = ['All', ...names];
  document.getElementById('filter-row').innerHTML = allFilters.map(d =>
    `<button class="chip${filterDriver === d ? ' active' : ''}" onclick="setFilter('${d}')">${d}</button>`
  ).join('');

  const filtered = filterDriver === 'All'
    ? state.sessions
    : state.sessions.filter(s => s.driver === filterDriver);

  if (filtered.length === 0) {
    document.getElementById('sessions-list').innerHTML = '<div class="empty">No sessions logged yet</div>';
    return;
  }

  document.getElementById('sessions-list').innerHTML = filtered.map(s => {
    const bc = badgeColor(s.condition);
    const isExpanded = expandedId === s.id;
    return `<div class="session-row${isExpanded ? ' expanded' : ''}" onclick="toggleExpand('${s.id}')">
      <div class="session-top">
        <div>
          <div class="session-driver">${s.driver}</div>
          <div class="session-date">${formatDate(s.startTime)}</div>
        </div>
        <div style="text-align:right">
          <div class="session-duration">${formatDuration(s.duration)}</div>
          ${s.miles ? `<div class="session-miles">${s.miles} mi ${s.milesSource === 'gps' ? '<span style="font-size:10px;opacity:0.7">(GPS)</span>' : ''}</div>` : ''}
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
        <div style="background:#0F172A;border-radius:10px;padding:8px 12px;border:1px solid #334155">
          <div style="font-size:10px;color:#94A3B8;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;margin-bottom:3px">Start</div>
          <div style="font-size:15px;font-weight:700;color:#F1F5F9">${formatTime(s.startTime)}</div>
        </div>
        <div style="background:#0F172A;border-radius:10px;padding:8px 12px;border:1px solid #334155">
          <div style="font-size:10px;color:#94A3B8;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;margin-bottom:3px">Stop</div>
          <div style="font-size:15px;font-weight:700;color:#F1F5F9">${formatTime(s.endTime)}</div>
        </div>
      </div>
      <div class="session-meta" style="margin-top:8px">
        <span class="badge" style="background:${bc.split(';')[0]};${bc.split(';')[1]}">${s.condition}</span>
        ${s.supervisorName ? `<span style="font-size:12px;color:#94A3B8">👤 ${s.supervisorType}: ${s.supervisorName}</span>` : ''}
      </div>
      ${isExpanded ? `<div class="session-detail">
        ${s.startOdometer ? `<div class="session-odo">Odometer: ${s.startOdometer} mi${s.endOdometer ? ` → ${s.endOdometer} mi` : ''}</div>` : ''}
        ${s.miles && s.milesSource === 'gps' ? `<div class="session-odo">📍 GPS distance: ~${s.miles} mi (straight-line)</div>` : ''}
        ${s.startGPS && s.endGPS ? `<a href="${mapsUrl(s.startGPS, s.endGPS)}" onclick="event.stopPropagation()" style="display:block;text-align:center;padding:9px 0;margin-top:4px;border-radius:10px;background:#22D3EE22;color:#22D3EE;font-size:13px;font-weight:700;border:1px solid #22D3EE44;text-decoration:none">🗺 Open Route in Maps</a>` : ''}
        ${s.startGPS ? `<div style="font-size:11px;color:#475569;margin-top:6px">Start: ${s.startGPS.lat.toFixed(5)}, ${s.startGPS.lng.toFixed(5)}</div>` : ''}
        ${s.endGPS ? `<div style="font-size:11px;color:#475569;margin-top:2px">End: ${s.endGPS.lat.toFixed(5)}, ${s.endGPS.lng.toFixed(5)}</div>` : ''}
        ${s.notes ? `<div class="session-notes" style="margin-top:8px">📝 ${s.notes}</div>` : ''}
        <button class="action-btn danger" onclick="event.stopPropagation();deleteSession('${s.id}')">Delete Session</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

function renderSettings() {
  // Driver name inputs - use onblur to avoid losing focus on every keystroke
  const focusedEl = document.activeElement;
  const isFocusedOnDriver = focusedEl && focusedEl.dataset && focusedEl.dataset.driverIdx !== undefined;
  if (!isFocusedOnDriver) {
    document.getElementById('driver-name-inputs').innerHTML = [0,1,2].map(i =>
      `<div style="margin-bottom:12px">
        <label class="field-label">Driver ${i+1}</label>
        <input class="field-input" placeholder="Driver ${i+1}" value="${state.drivers[i] || ''}"
          data-driver-idx="${i}"
          onblur="updateDriverName(${i}, this.value)"
          onkeydown="if(event.key==='Enter'){this.blur()}">
      </div>`
    ).join('');
  }

  // Summary
  const names = driverNames();
  document.getElementById('summary-list').innerHTML = names.map((name, i) => {
    const st = statsFor(name);
    return `<div class="summary-row">
      <div class="summary-name">${name}</div>
      <div class="summary-stats">
        <span>⏱ ${formatDuration(st.totalMs)}</span>
        <span>🛣 ${st.totalMiles || 0} mi</span>
        <span>🌙 ${st.night} night</span>
        <span>🌧 ${st.adverse} adverse</span>
      </div>
    </div>`;
  }).join('');
}

// ---- ACTIONS ----

function selectDriver(i) {
  selectedDriver = i;
  renderDriverTabs();
}

function selectCondition(c) {
  selectedCondition = c;
  renderConditionChips();
}

function selectSupervisorType(t) {
  selectedSupervisorType = t;
  renderSupervisorChips();
}

// ---- GPS ----

function getPosition() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) { resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: Math.round(pos.coords.accuracy) }),
      () => resolve(null),
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
    );
  });
}

function haversine(a, b) {
  if (!a || !b) return null;
  const R = 3958.8; // miles
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const x = Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(a.lat * Math.PI/180) * Math.cos(b.lat * Math.PI/180) *
    Math.sin(dLng/2) * Math.sin(dLng/2);
  return Math.round(2 * R * Math.asin(Math.sqrt(x)) * 10) / 10;
}

function mapsUrl(start, end) {
  if (!start || !end) return null;
  return `https://maps.apple.com/?saddr=${start.lat},${start.lng}&daddr=${end.lat},${end.lng}&dirflg=d`;
}

function toggleDrive() {
  if (state.active) {
    stopDrive();
  } else {
    startDrive();
  }
}

async function startDrive() {
  const btn = document.getElementById('main-btn');
  btn.disabled = true;
  btn.textContent = '📍 Getting location…';

  const startOdo = parseFloat(document.getElementById('start-odo').value) || null;
  const gps = await getPosition();

  const supervisorName = document.getElementById('supervisor-name').value.trim();
  const active = {
    driver: driverNames()[selectedDriver],
    startTime: Date.now(),
    startOdometer: startOdo,
    condition: selectedCondition,
    startGPS: gps,
    supervisorType: selectedSupervisorType,
    supervisorName: supervisorName,
  };
  persist({ ...state, active });
  document.getElementById('start-odo').value = '';
  document.getElementById('supervisor-name').value = '';
  btn.disabled = false;
  renderDriveUI();
  renderHeader();
}

async function stopDrive() {
  if (!state.active) return;
  const btn = document.getElementById('main-btn');
  btn.disabled = true;
  btn.textContent = '📍 Getting location…';

  const end = Date.now();
  const endGPS = await getPosition();
  const endOdoVal = document.getElementById('end-odo').value;
  const endOdo = endOdoVal ? parseFloat(endOdoVal) : null;

  // Miles: odometer takes priority, GPS straight-line as fallback
  let miles = null;
  let milesSource = null;
  if (endOdo && state.active.startOdometer) {
    miles = Math.round((endOdo - state.active.startOdometer) * 10) / 10;
    milesSource = 'odometer';
  } else if (state.active.startGPS && endGPS) {
    miles = haversine(state.active.startGPS, endGPS);
    milesSource = 'gps';
  }

  const session = {
    id: Date.now().toString(),
    driver: state.active.driver,
    startTime: state.active.startTime,
    endTime: end,
    duration: end - state.active.startTime,
    startOdometer: state.active.startOdometer,
    endOdometer: endOdo,
    miles: miles && miles > 0 ? miles : null,
    milesSource,
    condition: state.active.condition,
    notes: document.getElementById('notes').value.trim(),
    startGPS: state.active.startGPS,
    endGPS,
    supervisorType: state.active.supervisorType,
    supervisorName: state.active.supervisorName,
  };
  const newData = { ...state, active: null, sessions: [session, ...state.sessions] };
  persist(newData);
  document.getElementById('end-odo').value = '';
  document.getElementById('notes').value = '';
  btn.disabled = false;
  autoSaveJSON(newData);
  render();
}

function deleteSession(id) {
  persist({ ...state, sessions: state.sessions.filter(s => s.id !== id) });
  expandedId = null;
  renderLog();
  renderStats();
}

function updateDriverName(i, val) {
  const drivers = [...state.drivers];
  drivers[i] = val;
  persist({ ...state, drivers });
  renderDriverTabs();
  renderLog();
  renderSettings();
}

function setFilter(d) {
  filterDriver = d;
  renderLog();
}

function toggleExpand(id) {
  expandedId = expandedId === id ? null : id;
  renderLog();
}

// ---- VIEWS ----

function switchView(v) {
  currentView = v;
  ['home','log','settings'].forEach(name => {
    document.getElementById(`view-${name}`).classList.toggle('active', name === v);
    document.getElementById(`tab-${name}`).classList.toggle('active', name === v);
  });
  if (v === 'log') renderLog();
  if (v === 'settings') renderSettings();
}

// ---- TIMER ----

function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(updateTimer, 1000);
  updateTimer();
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('timer').textContent = '00:00';
}

function updateTimer() {
  if (!state.active) return;
  const elapsed = Math.floor((Date.now() - state.active.startTime) / 1000);
  const h = Math.floor(elapsed / 3600);
  const m = Math.floor((elapsed % 3600) / 60);
  const s = elapsed % 60;
  const str = h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
    : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById('timer').textContent = str;
}

// ---- FILE I/O ----

function autoSaveJSON(data) {
  try {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const date = new Date().toISOString().slice(0,10);
    a.download = `driver_log_${date}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    flashSaved();
  } catch(e) {}
}

function exportJSON() {
  autoSaveJSON(state);
}

function exportCSV() {
  const rows = [
    'Driver,Date,Start,End,Duration(min),Miles,MilesSource,Condition,SupervisorType,SupervisorName,Notes,StartLat,StartLng,EndLat,EndLng',
    ...state.sessions.map(s => [
      s.driver,
      formatDate(s.startTime),
      formatTime(s.startTime),
      formatTime(s.endTime),
      Math.round(s.duration / 60000),
      s.miles || '',
      s.milesSource || '',
      s.condition,
      s.supervisorType || '',
      s.supervisorName || '',
      (s.notes || '').replace(/,/g, ';'),
      s.startGPS ? s.startGPS.lat : '',
      s.startGPS ? s.startGPS.lng : '',
      s.endGPS ? s.endGPS.lat : '',
      s.endGPS ? s.endGPS.lng : '',
    ].join(','))
  ].join('\n');
  const blob = new Blob([rows], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'driver_log.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

function restoreJSON(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (parsed.sessions) {
        persist(parsed);
        render();
        alert('Data restored successfully!');
      }
    } catch { alert('Could not read backup file.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function flashSaved() {
  const el = document.getElementById('badge-saved');
  el.style.display = '';
  setTimeout(() => { el.style.display = 'none'; }, 2000);
}

// ---- INIT ----
render();
</script>
